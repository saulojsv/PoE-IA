<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoE Build Lab</title>
<style>
:root{--bg:#0f1114;--side:#14171b;--panel:#171a1f;--panel2:#1d2228;--line:#2a3139;--text:#eef1f3;--muted:#9aa4ad;--gold:#caa45d;--green:#7fca9a;--red:#d47d7d;--blue:#7db7dd}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,Segoe UI,Arial,sans-serif}.app{display:grid;grid-template-columns:260px minmax(0,1fr);min-height:100vh}.side{background:var(--side);border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}.brand{font-size:21px;font-weight:750}.sub{color:var(--muted);font-size:12px;margin:4px 0 22px}.nav{display:grid;gap:6px}.nav button,.btn{background:transparent;color:var(--muted);border:1px solid transparent;border-radius:7px;padding:10px 12px;text-align:left;cursor:pointer}.nav button.active,.nav button:hover,.btn.active{background:var(--panel2);border-color:var(--line);color:var(--text)}.main{padding:24px 30px;max-width:1780px;width:100%}.hero{display:flex;justify-content:space-between;gap:18px;align-items:end;margin-bottom:18px}.hero h1{font-size:26px;margin:0 0 6px}.hero p{margin:0;color:var(--muted)}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.search,.select{background:#111419;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px 12px;height:40px}.search{min-width:320px;width:420px}.stats{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:12px;margin-bottom:18px}.stat,.panel,.list,.detail{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}.stat{padding:14px}.stat span{display:block;color:var(--muted);font-size:12px}.stat b{font-size:24px}.layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px}.head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center}.scroll{max-height:720px;overflow:auto}.skill{padding:12px 14px;border-bottom:1px solid #242a31;cursor:pointer}.skill:hover,.skill.active{background:#20262d}.skill-name{font-weight:700;color:#f5f0e7}.pill{display:inline-flex;border:1px solid #39424c;background:#20262d;border-radius:999px;padding:3px 8px;margin:3px 4px 3px 0;font-size:12px;color:#dce3e8}.pill small{color:var(--gold);margin-left:5px}.body{padding:16px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.grid{display:grid;gap:16px}.items-layout{display:grid;grid-template-columns:520px minmax(0,1fr) 320px;gap:16px}.equip-board{position:relative;height:430px;background:radial-gradient(circle at 50% 35%,#26313a,#12161b 62%);border:1px solid var(--line);border-radius:8px}.gear{position:absolute;background:#28322d;border:1px solid #405041;border-radius:3px;padding:4px;display:grid;place-items:center;cursor:pointer}.gear.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}.gear.locked{opacity:.45;cursor:default}.gear .sprite{float:none;margin:0;width:100%;height:100%;object-fit:contain}.gear small{position:absolute;left:4px;right:4px;bottom:-18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#c8d0d6;font-size:10px;text-align:center}.weapon{left:42px;top:22px;width:72px;height:150px}.helmet{left:155px;top:20px;width:72px;height:66px}.amulet{left:242px;top:72px;width:38px;height:38px}.bodySlot{left:158px;top:96px;width:86px;height:112px}.offhand{left:348px;top:18px;width:82px;height:150px}.gloves{left:84px;top:170px;width:82px;height:70px}.ring1{left:262px;top:122px;width:38px;height:38px}.ring2{left:304px;top:122px;width:38px;height:38px}.belt{left:205px;top:216px;width:96px;height:42px}.boots{left:320px;top:210px;width:86px;height:72px}.flasks{position:absolute;left:145px;right:145px;bottom:48px;display:flex;justify-content:center;gap:7px}.flask{width:36px;height:50px}.jewel-section{margin-top:12px}.jewel-title{font-size:10px;color:var(--muted);text-transform:uppercase;margin:8px 0 5px}.jewel-row{display:flex;gap:7px;flex-wrap:wrap}.jewel-slot{width:48px;height:48px;background:#111419;border:1px solid var(--line);border-radius:5px;padding:3px;cursor:pointer;position:relative}.jewel-slot.active{border-color:var(--gold)}.jewel-slot .sprite{width:100%;height:100%;object-fit:contain;float:none;margin:0}.slot-label{font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:7px}.sprite{width:58px;height:58px;object-fit:contain;float:right;margin-left:8px}.item-name{font-weight:700}.item-base,.muted{color:var(--muted);font-size:12px}.implicit{color:#d8c08a;font-size:12px;margin-top:4px}.pool{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}.pool-item{background:#111419;border:1px solid var(--line);border-radius:8px;padding:9px;min-height:82px;cursor:pointer}.pool-item:hover,.pool-item.active{border-color:var(--gold);background:#20262d}.metric{display:flex;justify-content:space-between;border-bottom:1px solid #242a31;padding:8px 0}.good{color:var(--green)}.bad{color:var(--red)}.bar{height:7px;background:#242b32;border-radius:99px;overflow:hidden;margin:5px 0 10px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--blue))}.chart-row{display:grid;grid-template-columns:minmax(120px,1fr) minmax(160px,1.4fr) 92px;gap:12px;align-items:center;margin-bottom:12px}.chart-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}.num{text-align:right;font-variant-numeric:tabular-nums}.panels{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}.panel{padding:14px}.panel h2{font-size:15px;margin:0 0 10px}.empty{color:var(--muted);padding:26px;text-align:center}
@media(max-width:1200px){.items-layout,.layout{grid-template-columns:1fr}.stats,.panels{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.stats,.panels,.equip{grid-template-columns:1fr}.search{min-width:0;width:100%}}
</style>
</head>
<body>
<div class="app">
<aside class="side">
<div class="brand">PoE Build Lab</div>
<div class="sub">Builds, itens e geracao visual</div>
<nav class="nav">
<button class="active" data-view="generator">Smart Generator</button>
<button data-view="skills">Skills</button>
<button data-view="gems">Gems</button>
<button data-view="items">Items</button>
<button data-view="nodes">Nodes</button>
</nav>
</aside>
<main class="main">
<div class="hero">
<div><h1>InteligÃªncia de Builds</h1><p>Itens organizados por slot, sprite e base, no estilo de comparaÃ§Ã£o por build.</p></div>
<div class="toolbar"><input class="search" id="q" placeholder="Buscar skill, classe, item, gem ou nodo"><select class="select" id="sort"><option value="builds">Mais builds</option><option value="dps">Maior DPS</option><option value="space">Mais combinaÃ§Ãµes</option><option value="name">Nome</option></select></div>
</div>
<section class="stats" id="stats"></section>
<section class="layout">
<div class="list"><div class="head"><b id="title">Skills</b><span class="sub" id="count"></span></div><div id="table" class="scroll"></div></div>
<aside class="detail" id="detail"><div class="empty">Carregando dados...</div></aside>
</section>
<section class="panels"><div class="panel"><h2>Top Gems</h2><div id="topGems"></div></div><div class="panel"><h2>Top Items</h2><div id="topItems"></div></div><div class="panel"><h2>Top Nodes</h2><div id="topNodes"></div></div></section>
</main>
</div>
<script>
let data=null,sprites={},modSources=[],view="generator",selected=null,selectedBuild=null,activeSlot="body",slotChoices={};
const slots=[["helmet","Helmet"],["amulet","Amulet"],["body","Armadura"],["weapon","Arma"],["offhand","Offhand"],["gloves","Gloves"],["ring1","Ring 1"],["ring2","Ring 2"],["belt","Belt"],["boots","Boots"]];
const fallback={helmet:"../assets/poe_item_sprites/fallback/icon_helmet.png",amulet:"../assets/poe_item_sprites/fallback/icon_amulet.png",body:"../assets/poe_item_sprites/fallback/icon_body_armour.png",weapon:"../assets/poe_item_sprites/fallback/icon_weapon.png",twohand:"../assets/poe_item_sprites/fallback/icon_weapon_2.png",offhand:"../assets/poe_item_sprites/fallback/icon_shield.png",gloves:"../assets/poe_item_sprites/fallback/icon_gloves.png",ring:"../assets/poe_item_sprites/fallback/icon_ring_left.png",ring1:"../assets/poe_item_sprites/fallback/icon_ring_left.png",ring2:"../assets/poe_item_sprites/fallback/icon_ring_right.png",belt:"../assets/poe_item_sprites/fallback/icon_belt.png",boots:"../assets/poe_item_sprites/fallback/icon_boots.png",flask:"../assets/poe_item_sprites/fallback/icon_belt.png",jewel:"../assets/poe_item_sprites/fallback/icon_amulet.png"};
const el=id=>document.getElementById(id),fmt=n=>(Math.round(Number(n)||0)).toLocaleString("pt-PT"),short=s=>(s||"").split(/[\\/]/).pop().replace(".xml","").replace(/_/g," ");
Promise.all([fetch("build_dashboard_data.json").then(r=>r.json()),fetch("item_sprite_index.json").then(r=>r.ok?r.json():{}).catch(()=>({})),fetch("../data/items/modifier_sources.json").then(r=>r.ok?r.json():[]).catch(()=>[])]).then(([j,s,m])=>{data=j;sprites=s;modSources=m;selected=data.skills[0];selectedBuild=selected.build_rows[0];activeSlot=firstSlot(selectedBuild);render()}).catch(e=>{el("detail").innerHTML=`<div class=empty>${e.message}. Abra por http://localhost:8765/dashboard/</div>`});
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{document.querySelector(".nav .active").classList.remove("active");b.classList.add("active");view=b.dataset.view;render()});
el("q").oninput=render;el("sort").onchange=render;
function pct(n,b){return b?((n-b)/b*100):0}
function chips(xs,n=8){return (xs||[]).slice(0,n).map(x=>`<span class=pill>${x[0]} <small>${x[1]}</small></span>`).join("")}
function safeFile(s){return (s||"").normalize("NFKD").replace(/[^\w.-]+/g,"_").replace(/^_+|_+$/g,"")}
function spriteSrc(it,slot=""){if(!it)return fallback[slot]||"";let rare=["Rare","Magic","Normal"].includes(it.rarity),src=rare?(sprites[it.base]||sprites[it.name]):(sprites[it.name]||sprites[it.base]);return src||fallback[slot]||fallback[it.slot]||fallback[keyFor(it)]||""}
function img(it,slot=""){let src=spriteSrc(it,slot);return src?`<img class=sprite src="${src}" alt="">`:""}
function rows(){let q=el("q").value.toLowerCase();let r=[...data.skills].filter(x=>(x.skill+" "+JSON.stringify(x.classes)+" "+JSON.stringify(x.items)).toLowerCase().includes(q));let s=el("sort").value;r.sort((a,b)=>s=="dps"?b.best_dps-a.best_dps:s=="space"?b.candidate_space-a.candidate_space:s=="name"?a.skill.localeCompare(b.skill):b.builds-a.builds);return r}
function renderStats(){let s=data.summary,total=data.skills.reduce((a,x)=>a+x.candidate_space,0);el("stats").innerHTML=[["XMLs",s.xml_builds],["Skills",s.skills_with_xml],["Gems",s.unique_gems],["Itens",s.unique_items],["Nodos",s.unique_nodes],["CombinaÃ§Ãµes",total]].map(x=>`<div class=stat><span>${x[0]}</span><b>${fmt(x[1])}</b></div>`).join("")}
function renderTable(){let r=rows();el("title").textContent=view=="generator"?"Skills para gerar":view;el("count").textContent=`${r.length} registros`;if(view!="generator"&&view!="skills"){let src=view=="gems"?data.top_gems:view=="items"?data.top_items:data.top_nodes,q=el("q").value.toLowerCase();el("table").innerHTML=`<table><tr><th>Nome</th><th class=num>Usos</th></tr>${src.filter(x=>x[0].toLowerCase().includes(q)).map(x=>`<tr><td>${x[0]}</td><td class=num>${fmt(x[1])}</td></tr>`).join("")}</table>`;return}el("table").innerHTML=r.map(x=>`<div class="skill ${selected&&selected.skill==x.skill?'active':''}" onclick="pick(${data.skills.indexOf(x)})"><div class=skill-name>${x.skill}</div><div class=muted>${fmt(x.builds)} XMLs | maior DPS ${fmt(x.best_dps)}</div><div>${chips(x.classes,2)}</div></div>`).join("")}
function firstSlot(b){let m=autoMap(b.item_details||[]);return slots.find(s=>m[s[0]]&&!m[s[0]].locked)?.[0]||"body"}
function pick(i){selected=data.skills[i];selectedBuild=selected.build_rows[0];activeSlot=firstSlot(selectedBuild);slotChoices={};render()}
function pickBuild(i){selectedBuild=selected.build_rows[i];activeSlot=firstSlot(selectedBuild);slotChoices={};renderDetail()}
function keyFor(it){return it.slot=="jewel"?"jewel":it.slot=="ring"?"ring":it.slot=="twohand"?"weapon":it.slot}
function autoMap(items){let m={},rings=[];for(let it of items||[]){if(it.slot=="ring")rings.push(it);else if(it.slot=="twohand"){m.weapon=it;m.offhand={name:"Ocupado por arma two-handed",base:"Slot bloqueado",locked:true}}else if(!m[it.slot])m[it.slot]=it}if(rings[0])m.ring1=rings[0];if(rings[1])m.ring2=rings[1];return m}
function pool(slot){let out=[];for(let b of selected.build_rows||[])for(let it of b.item_details||[]){let k=keyFor(it);if(slot=="jewel"&&k=="jewel"||((slot=="ring1"||slot=="ring2")&&k=="ring")||k==slot)out.push(it)}let seen=new Set();return out.filter(it=>{let k=it.name+"|"+it.base;if(seen.has(k))return false;seen.add(k);return true}).sort((a,b)=>a.name.localeCompare(b.name))}
function currentMap(){let m=autoMap(selectedBuild.item_details||[]);for(let k in slotChoices){let it=pool(k).find(x=>x.name+"|"+x.base==slotChoices[k]);if(it)m[k]=it}if(m.weapon&&m.weapon.slot=="twohand")m.offhand={name:"Ocupado por arma two-handed",base:"Slot bloqueado",locked:true};return m}
function choose(slot,it){slotChoices[slot]=it.name+"|"+it.base;activeSlot=slot;renderDetail()}
function setSlot(k){activeSlot=k;renderDetail()}
function slotCard(k,l,m){let it=m[k];if(!it)return `<div class="slot ${activeSlot==k?'active':''}" onclick="setSlot('${k}')"><div class=slot-label>${l}</div><div class=muted>vazio</div></div>`;return `<div class="slot ${activeSlot==k?'active':''} ${it.locked?'locked':''}" ${it.locked?'':`onclick="setSlot('${k}')"`}><div class=slot-label>${l}</div>${it.locked?'':img(it)}<div class=item-name>${it.name}</div><div class=item-base>${it.base||""}</div><div class=muted>${it.rarity||""}${it.item_level?` | ilvl ${it.item_level}`:""}</div></div>`}
function gearCard(k,m){let cls=k=="body"?"bodySlot":k,it=m[k],label=(slots.find(x=>x[0]==k)||[k,k])[1];if(!it)return `<div class="gear ${cls} ${activeSlot==k?'active':''}" title="${label}" onclick="setSlot('${k}')"><img class=sprite src="${fallback[k]||''}" alt=""><small>${label}</small></div>`;return `<div class="gear ${cls} ${activeSlot==k?'active':''} ${it.locked?'locked':''}" title="${it.name} | ${it.base||''}" ${it.locked?'':`onclick="setSlot('${k}')"`}>${it.locked?`<img class=sprite src="${fallback[k]||''}" alt="">`:img(it,k)}<small>${it.locked?'bloqueado':it.name}</small></div>`}
function flaskBar(items){let fs=(items||[]).filter(x=>(x.base||x.name||"").toLowerCase().includes("flask")).slice(0,5);return `<div class=flasks>${[0,1,2,3,4].map(i=>{let it=fs[i];return `<div class="gear flask" title="${it?it.name:'Flask'}">${img(it,"flask")}</div>`}).join("")}</div>`}
function jewelSections(b){let jewels=(b.item_details||[]).filter(x=>x.slot=="jewel"),groups={cluster:[],base:[],other:[],abyss:[]};for(let it of jewels){let t=(it.base+" "+it.name).toLowerCase();if(t.includes("cluster"))groups.cluster.push(it);else if(t.includes("abyss")||t.includes("ghastly")||t.includes("hypnotic")||t.includes("murderous")||t.includes("searching"))groups.abyss.push(it);else if(t.includes("crimson")||t.includes("cobalt")||t.includes("viridian")||t.includes("prismatic"))groups.base.push(it);else groups.other.push(it)}let row=(title,arr)=>`<div class=jewel-title>${title}</div><div class=jewel-row>${arr.slice(0,10).map((it,i)=>`<div class="jewel-slot ${activeSlot=='jewel'?'active':''}" onclick="activeSlot='jewel';renderDetail()" title="${it.name} | ${it.base}">${img(it,"jewel")}</div>`).join("")||`<div class=muted>vazio</div>`}</div>`;return `<div class=jewel-section>${row("Cluster Jewels",groups.cluster)}${row("Base Jewels",groups.base)}${row("Other",groups.other)}${row("Abyss Jewels",groups.abyss)}</div>`}
function equipmentBoard(m,b){return `<div class=panel><h2>Equipamento visual</h2><div class=equip-board>${["weapon","helmet","amulet","body","offhand","gloves","ring1","ring2","belt","boots"].map(k=>gearCard(k,m)).join("")}${flaskBar(b.item_details)}</div>${jewelSections(b)}</div>`}
function modCats(it){let slot=(it&&it.slot)||"",base=(it&&it.base||"").toLowerCase();let cats=["Explicit","Implicit","Master","Corrupted","Synthesis","ItemExclusive"];if(["body","helmet","gloves","boots"].includes(slot))cats.push("Eldritch");if(slot=="belt"||slot=="ring"||slot=="amulet")cats.push("Veiled");if(slot=="jewel"||base.includes("jewel"))cats.push("Jewel","JewelAbyss","JewelCluster");if(base.includes("flask"))cats.push("Flask");return modSources.filter(x=>cats.includes(x.category))}
function modPanel(it){let cats=modCats(it);return `<div class=panel><h2>Modificadores possiveis</h2><div class=muted>Fonte local PoB. Ainda por normalizar por base exata, ilvl, prefix/suffix e tags.</div>${cats.map(c=>`<div class=metric><span>${c.category}</span><b>${fmt(c.estimated_entries)}</b></div>`).join("")||"<div class=muted>Nenhuma categoria encontrada.</div>"}</div>`}
const metricRows=[["DPS","combined_dps"],["EHP","ehp"],["Vida","life"],["ES","energy_shield"],["Block","block"],["Spell block","spell_block"],["Suppress","suppression"],["Fire res","fire_resist"],["Cold res","cold_resist"],["Lightning res","lightning_resist"],["Chaos res","chaos_resist"],["Atk speed","attack_speed"],["Crit multi","crit_multi"]];
function buildWithItem(it){if(!it)return null;let key=it.name+"|"+it.base;return selected.build_rows.find(b=>(b.item_details||[]).some(x=>x.name+"|"+x.base==key))||null}
function metricPanel(base,it){let target=buildWithItem(it),note=target?"ComparaÃ§Ã£o baseada em outro XML que usa este item.":"Sem XML comparÃ¡vel para este item.";return `<div class=panel><h2>Atributos da build</h2><div class=muted>${note}</div>${metricRows.map(([label,key])=>{let a=base[key]||0,b=target?target[key]||0:a,d=target?pct(b,a):0;return `<div class=metric><span>${label}</span><b>${fmt(a)}${target?` <span class="${d>=0?'good':'bad'}">(${d>=0?'+':''}${d.toFixed(1)}%)</span>`:""}</b></div>`}).join("")}</div>`}
function itemPanel(it){let base=selectedBuild||selected.build_rows[0];if(!it)return `<div class=panel><h2>Item</h2><div class=muted>Selecione um slot.</div></div>`;return `<div>${`<div class=panel><h2>Item selecionado</h2>${img(it)}<div class=item-name>${it.name}</div><div class=item-base>${it.base||""}</div><div class=metric><span>Rarity</span><b>${it.rarity||"-"}</b></div><div class=metric><span>Item level</span><b>${it.item_level||"-"}</b></div><div class=metric><span>Slot</span><b>${it.slot||"-"}</b></div>${(it.implicits||[]).map(x=>`<div class=implicit>${x}</div>`).join("")}</div>`}${metricPanel(base,it)}${modPanel(it)}</div>`}
function poolPanel(m){let list=pool(activeSlot),cur=m[activeSlot];return `<div class=panel><h2>OpÃ§Ãµes do slot</h2><div class=muted>${list.length} itens encontrados nos XMLs desta skill</div><div class=pool>${list.map(it=>`<div class="pool-item ${cur&&cur.name==it.name&&cur.base==it.base?'active':''}" onclick='choose("${activeSlot}",${JSON.stringify(it)})'>${img(it)}<div class=item-name>${it.name}</div><div class=item-base>${it.base}</div></div>`).join("")||"<div class=empty>Nenhum item para este slot.</div>"}</div></div>`}
function gains(base,best){return [["DPS",best.combined_dps,base.combined_dps],["EHP",best.ehp,base.ehp],["Life",best.life,base.life],["ES",best.energy_shield,base.energy_shield],["Block",best.block,base.block]].map(g=>{let d=pct(g[1],g[2]);return `<div class=metric><span>${g[0]}</span><b class="${d>=0?'good':'bad'}">${d>=0?'+':''}${d.toFixed(1)}%</b></div>`}).join("")}
function chart(rs,key){let vals=rs.map(x=>x[key]||0),max=Math.max(...vals,1),base=vals[0]||1;return rs.slice(0,10).map((x,i)=>{let v=x[key]||0,d=pct(v,base);return `<div class=chart-row onclick="pickBuild(${selected.build_rows.indexOf(x)})"><div class=chart-label title="${short(x.file)}">${short(x.file)}</div><div class=bar><i style="width:${v/max*100}%"></i></div><div class=num><div>${fmt(v)}</div><div class="${d>=0?'good':'bad'}">${i?`${d>=0?'+':''}${d.toFixed(1)}%`:"base"}</div></div></div>`}).join("")}
function generator(){let b=selectedBuild||selected.build_rows[0],w={ehp:3,life:2,es:1,block:2,dps:3,speed:1,crit:1},ranked=[...selected.build_rows].sort((a,b)=>((b.ehp||0)*w.ehp+(b.combined_dps||0)*w.dps)-((a.ehp||0)*w.ehp+(a.combined_dps||0)*w.dps)),best=ranked[0]||b,m=currentMap(),it=activeSlot=="jewel"?(b.item_details||[]).find(x=>x.slot=="jewel"):m[activeSlot];return `<div class=head><b>${selected.skill}</b><span class=muted>${fmt(selected.candidate_space)} combinaÃ§Ãµes</span></div><div class=body><div class=tabs><button class="btn active">Itens</button><button class=btn>Defesa</button><button class=btn>DPS</button></div><div class=items-layout>${equipmentBoard(m,b)}${poolPanel(m)}${itemPanel(it)}</div><div class=grid style="grid-template-columns:1fr 1fr;margin-top:16px"><div class=panel><h2>Ganho/perda do melhor candidato</h2>${gains(b,best)}</div><div class=panel><h2>Ranking por DPS</h2>${chart(ranked,"combined_dps")}</div></div></div>`}
function renderDetail(){if(!selected)return;el("detail").innerHTML=generator()}
function renderTop(id,src){let max=Math.max(...src.map(x=>x[1]),1);el(id).innerHTML=src.slice(0,10).map(x=>`<div class=metric><span>${x[0]}</span><b>${fmt(x[1])}</b></div><div class=bar><i style="width:${x[1]/max*100}%"></i></div>`).join("")}
function render(){if(!data)return;renderStats();renderTable();renderDetail();renderTop("topGems",data.top_gems);renderTop("topItems",data.top_items);renderTop("topNodes",data.top_nodes)}
</script>
</body>
