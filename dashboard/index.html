<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoE Build Lab</title>
<style>
:root{--bg:#0f1114;--panel:#171a1f;--panel2:#1d2228;--line:#2a3139;--text:#eef1f3;--muted:#9aa4ad;--gold:#caa45d;--blue:#7db7dd;--green:#7fca9a;--red:#d47d7d}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,Segoe UI,Arial,sans-serif}
.app{display:grid;grid-template-columns:260px minmax(0,1fr);min-height:100vh}.side{background:#14171b;border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}.brand{font-size:21px;font-weight:750;margin-bottom:4px}.sub{color:var(--muted);font-size:12px;margin-bottom:24px}
.nav{display:grid;gap:6px}.nav button{width:100%;text-align:left;background:transparent;color:var(--muted);border:1px solid transparent;border-radius:7px;padding:10px 12px;cursor:pointer}.nav button.active,.nav button:hover{background:var(--panel2);border-color:var(--line);color:var(--text)}
.main{padding:24px 30px;max-width:1680px;width:100%}.hero{display:flex;justify-content:space-between;gap:18px;align-items:end;margin-bottom:18px}.hero h1{font-size:26px;line-height:1.1;margin:0 0 6px}.hero p{margin:0;color:var(--muted)}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.search,.select{background:#111419;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px 12px;height:40px}.search{min-width:340px;width:420px}
.stats{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:12px;margin-bottom:18px}.stat{background:linear-gradient(180deg,#1b2026,#15191e);border:1px solid var(--line);border-radius:8px;padding:14px}.stat span{display:block;color:var(--muted);font-size:12px}.stat b{font-size:24px;font-variant-numeric:tabular-nums}
.layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px}.table,.detail,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}.table-head,.detail-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center}
.table-scroll{max-height:640px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px 14px;border-bottom:1px solid #242a31;text-align:left;vertical-align:middle}th{color:var(--muted);font-weight:650;font-size:12px;background:#171b20;position:sticky;top:0}tr{cursor:pointer}tr:hover{background:#1b2026}.num{text-align:right;font-variant-numeric:tabular-nums}.skill-name{font-weight:700;color:#f5f0e7}
.pill{display:inline-flex;align-items:center;border:1px solid #39424c;background:#20262d;border-radius:999px;padding:3px 8px;margin:3px 4px 3px 0;font-size:12px;color:#dce3e8;max-width:100%;white-space:nowrap}.pill small{color:var(--gold);margin-left:5px}.warn{color:var(--gold)}
.detail-body{padding:16px}.metric{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #242a31;padding:9px 0}.metric span{color:var(--muted)}.section{margin-top:16px}.section h3{font-size:12px;color:var(--muted);text-transform:uppercase;margin:0 0 8px;letter-spacing:.04em}.bar{height:7px;background:#242b32;border-radius:99px;overflow:hidden;margin:5px 0 10px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--blue))}
.panels{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}.panel{padding:14px}.panel h2{font-size:15px;margin:0 0 10px}.empty{color:var(--muted);padding:30px;text-align:center}.chart{display:grid;gap:10px}.chart-row{display:grid;grid-template-columns:170px 1fr 90px;gap:10px;align-items:center}.chart-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.delta{font-size:12px}.good{color:var(--green)}.bad{color:var(--red)}.build-card{padding:12px 14px;border-bottom:1px solid #242a31;cursor:pointer}.build-card:hover,.build-card.active{background:#20262d}.tabs{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}.tabs button,.primary{background:#111419;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:8px 10px;cursor:pointer}.tabs button.active,.primary{color:var(--text);border-color:var(--gold)}.gen{display:grid;grid-template-columns:1fr 1fr;gap:16px}.phase{border-top:1px solid #242a31;padding:14px 0}.phase:first-child{border-top:0;padding-top:0}.phase-head{display:flex;justify-content:space-between;gap:12px;align-items:center}.phase h3{margin:0;font-size:15px}.phase input{width:90px;background:#111419;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:8px}.weights{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.weights label{color:var(--muted);font-size:12px}.weights input{width:100%;margin-top:4px}.gain{display:grid;grid-template-columns:1fr 90px 90px 80px;gap:10px;align-items:center}.gain b{font-variant-numeric:tabular-nums}.note,.change{background:#14181d;border:1px solid var(--line);border-radius:8px;padding:12px;margin-top:12px;color:#dce3e8}.change-head{display:flex;justify-content:space-between;gap:10px}.change-name{font-weight:700}.change-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}.change-grid span{color:var(--muted);font-size:12px}.ask{width:100%;min-height:72px;margin-top:8px;background:#111419;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px;resize:vertical}.slot-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}.slot{background:#111419;border:1px solid var(--line);border-radius:8px;padding:10px;min-height:126px}.slot b{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}.item-img{width:54px;height:54px;object-fit:contain;image-rendering:auto;float:right;margin-left:8px}.item-name{font-weight:700}.item-base{color:var(--muted);font-size:12px}.locked{opacity:.55}.jewels{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.jewel{border-top:1px solid #242a31;padding:8px 0}.rule{color:var(--gold);font-size:12px;margin-top:4px}
@media(max-width:1050px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.stats,.layout,.panels{grid-template-columns:1fr}.search{min-width:0}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="brand">PoE Build Lab</div><div class="sub">XML intelligence, combinations and node testing</div><nav class="nav"><button class="active" data-view="generator">Smart Generator</button><button data-view="skills">Skills</button><button data-view="gems">Gems</button><button data-view="items">Items</button><button data-view="nodes">Nodes</button></nav></aside>
<main class="main">
<div class="hero"><div><h1>Build Intelligence</h1><p>Inventario de XMLs, pools de troca e candidatos para validação no PoB.</p></div><div class="toolbar"><input class="search" id="q" placeholder="Search skill, class, item, gem or node"><select class="select" id="sort"><option value="builds">Most builds</option><option value="dps">Best DPS</option><option value="space">Largest candidate space</option><option value="name">Name</option></select></div></div>
<section class="stats" id="stats"></section>
<section class="layout"><div class="table"><div class="table-head"><b id="title">Skills</b><span class="sub" id="count"></span></div><div id="table"></div></div><aside class="detail" id="detail"></aside></section>
<section class="panels"><div class="panel"><h2>Top Gems</h2><div id="topGems"></div></div><div class="panel"><h2>Top Items</h2><div id="topItems"></div></div><div class="panel"><h2>Top Nodes</h2><div id="topNodes"></div></div></section>
</main></div>
<script type="text/plain" id="legacy-script">
let data, view="generator", selected=null, selectedBuild=null, metric="combined_dps";
const fmt=n=>(Math.round(n||0)).toLocaleString("pt-PT");
const el=id=>document.getElementById(id);
const short=s=>(s||"").split(/[\\/]/).pop().replace(".xml","");
fetch("build_dashboard_data.json").then(r=>r.json()).then(j=>{data=j;selected=data.skills[0];selectedBuild=selected.build_rows[0];render()});
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{document.querySelector(".nav .active").classList.remove("active");b.classList.add("active");view=b.dataset.view;render()});
el("q").oninput=render;el("sort").onchange=render;
function chips(xs,n=8){return (xs||[]).slice(0,n).map(x=>`<span class="pill">${x[0]} <small>${x[1]}</small></span>`).join("")}
function stats(){let s=data.summary,total=data.skills.reduce((a,x)=>a+x.candidate_space,0);el("stats").innerHTML=[["XML builds",s.xml_builds],["Skills",s.skills_with_xml],["Gems",s.unique_gems],["Items",s.unique_items],["Nodes",s.unique_nodes],["Candidates",total]].map(x=>`<div class=stat><span>${x[0]}</span><b>${fmt(x[1])}</b></div>`).join("")}
function rows(){let q=el("q").value.toLowerCase(),r=[...data.skills].filter(x=>(x.skill+" "+JSON.stringify(x.classes)+" "+JSON.stringify(x.gems)+" "+JSON.stringify(x.items)+" "+x.build_rows.map(short).join(" ")).toLowerCase().includes(q));let s=el("sort").value;r.sort((a,b)=>s=="dps"?b.best_dps-a.best_dps:s=="space"?b.candidate_space-a.candidate_space:s=="name"?a.skill.localeCompare(b.skill):b.builds-a.builds);return r}
function table(){let r=rows();el("title").textContent=view=="generator"?"Skills para gerar":view[0].toUpperCase()+view.slice(1);el("count").textContent=`${r.length} records`;if(view!="skills"&&view!="generator"){let src=view=="gems"?data.top_gems:view=="items"?data.top_items:data.top_nodes;let q=el("q").value.toLowerCase();el("table").innerHTML=`<div class=table-scroll><table><tr><th>Name</th><th class=num>Uses</th></tr>${src.filter(x=>x[0].toLowerCase().includes(q)).map(x=>`<tr><td><span class=skill-name>${x[0]}</span></td><td class=num>${fmt(x[1])}</td></tr>`).join("")}</table></div>`;return}
el("table").innerHTML=`<div class=table-scroll>${r.map(x=>`<div class="build-card ${selected&&selected.skill==x.skill?'active':''}" onclick="pick(${data.skills.indexOf(x)})"><div class=skill-name>${x.skill}</div><div class=sub>${fmt(x.builds)} XMLs | best DPS ${fmt(x.best_dps)}</div><div>${chips(x.classes,2)}</div></div>`).join("")}</div>`}
function pick(i){selected=data.skills[i];selectedBuild=selected.build_rows[0];render()}
function pickBuild(i){selectedBuild=selected.build_rows[i];renderDetail()}
function metricTabs(){return [["combined_dps","DPS"],["ehp","EHP"],["life","Life"],["energy_shield","ES"]].map(x=>`<button class="${metric==x[0]?'active':''}" onclick="metric='${x[0]}';renderDetail()">${x[1]}</button>`).join("")}
function chart(rows,key){let vals=rows.map(x=>x[key]||0),max=Math.max(...vals,1),best=Math.max(...vals),worst=Math.min(...vals),base=vals[0]||1;return `<div class=chart>${rows.map((x,i)=>{let v=x[key]||0,p=v/max*100,d=base?((v-base)/base*100):0,c=v==best?'good':v==worst?'bad':'';return `<div class=chart-row onclick="pickBuild(${i})"><div class=chart-label title="${short(x.file)}">${short(x.file)}</div><div class=bar><i style="width:${p}%"></i></div><div class="num ${c}">${fmt(v)}<div class="delta ${d>=0?'good':'bad'}">${i?`${d>0?'+':''}${d.toFixed(1)}%`:''}</div></div></div>`}).join("")}</div>`}
function pct(n,b){return b?((n-b)/b*100):0}
function diff(a,b){let A=new Set(a||[]),B=new Set(b||[]);return {add:[...B].filter(x=>!A.has(x)),rem:[...A].filter(x=>!B.has(x))}}
function impactCards(base,best){let dps=pct(best.combined_dps,base.combined_dps),ehp=pct(best.ehp,base.ehp),life=pct(best.life,base.life),es=pct(best.energy_shield,base.energy_shield),res=pct((best.fire_resist+best.cold_resist+best.lightning_resist+best.chaos_resist)/4,(base.fire_resist+base.cold_resist+base.lightning_resist+base.chaos_resist)/4);let groups=[["Itens",diff(base.items,best.items)],["Gems",diff(base.gems,best.gems)],["Nodes",diff(base.nodes,best.nodes)]];return groups.map(g=>{let changes=[...g[1].add.slice(0,5).map(x=>`+ ${x}`),...g[1].rem.slice(0,5).map(x=>`- ${x}`)];if(!changes.length)return "";let bad=ehp<0||res<0;return `<div class=change><div class=change-head><div><div class=change-name>${g[0]}</div><div class=sub>${changes.join(" | ")}</div></div><b class="${bad?"bad":"good"}">${bad?"atenção":"ok"}</b></div><div class=change-grid><div><span>DPS</span><b class="${dps>=0?"good":"bad"}">${dps>=0?"+":""}${dps.toFixed(1)}%</b></div><div><span>EHP</span><b class="${ehp>=0?"good":"bad"}">${ehp>=0?"+":""}${ehp.toFixed(1)}%</b></div><div><span>Life/ES</span><b>${life>=0?"+":""}${life.toFixed(1)}% / ${es>=0?"+":""}${es.toFixed(1)}%</b></div><div><span>Res média</span><b class="${res>=0?"good":"bad"}">${res>=0?"+":""}${res.toFixed(1)}%</b></div></div></div>`}).join("")||"<div class=note>Nenhuma alteração estrutural detectada entre os XMLs comparados.</div>"}
function score(b,w){return (b.ehp||0)*w.ehp+(b.life||0)*w.life+(b.energy_shield||0)*w.es+(b.block||0)*700*w.block+(b.combined_dps||0)*w.dps+(b.attack_speed||0)*1200*w.speed+(b.crit_multi||0)*35*w.crit+(Math.min(75,b.fire_resist||0)+Math.min(75,b.cold_resist||0)+Math.min(75,b.lightning_resist||0)+Math.min(75,b.chaos_resist||0))*900*w.res}
function val(id,d){let n=document.getElementById(id);return n?Number(n.value||d):d}
function generator(){let x=selected,b=selectedBuild||x.build_rows[0],p1=val("p1",45),p2=val("p2",55),p3=Math.max(0,120-p1-p2),w={ehp:val("wEhp",3),life:val("wLife",2),es:val("wEs",1),block:val("wBlock",2),res:val("wRes",2),dps:val("wDps",3),speed:val("wSpeed",1),crit:val("wCrit",1)};let ranked=[...x.build_rows].sort((a,b)=>score(b,w)-score(a,w));let best=ranked[0]||b;let gains=[["DPS",best.combined_dps,b.combined_dps],["EHP",best.ehp,b.ehp],["Life",best.life,b.life],["ES",best.energy_shield,b.energy_shield],["Block",best.block,b.block],["Res média",((best.fire_resist+best.cold_resist+best.lightning_resist+best.chaos_resist)/4),((b.fire_resist+b.cold_resist+b.lightning_resist+b.chaos_resist)/4)]];return `<div class=detail-head><b>${x.skill}</b><span class=warn>${p1+p2+p3}/120 pontos</span></div><div class=detail-body><div class=gen><div><div class=phase><div class=phase-head><h3>Fase 1: sobrevivência</h3><input id=p1 type=number min=0 max=120 value="${p1}" oninput="renderDetail()"></div><div class=sub>HP, resistência, block, ES, suppression, hits máximos.</div><div class=weights><label>EHP<input id=wEhp type=number value="${w.ehp}" oninput="renderDetail()"></label><label>Life<input id=wLife type=number value="${w.life}" oninput="renderDetail()"></label><label>ES<input id=wEs type=number value="${w.es}" oninput="renderDetail()"></label><label>Block<input id=wBlock type=number value="${w.block}" oninput="renderDetail()"></label><label>Resist<input id=wRes type=number value="${w.res}" oninput="renderDetail()"></label></div></div><div class=phase><div class=phase-head><h3>Fase 2: dano</h3><input id=p2 type=number min=0 max=120 value="${p2}" oninput="renderDetail()"></div><div class=sub>DPS, conversão indireta pelos itens/gems, attack speed, crit e supports.</div><div class=weights><label>DPS<input id=wDps type=number value="${w.dps}" oninput="renderDetail()"></label><label>Speed<input id=wSpeed type=number value="${w.speed}" oninput="renderDetail()"></label><label>Crit<input id=wCrit type=number value="${w.crit}" oninput="renderDetail()"></label></div></div><div class=phase><div class=phase-head><h3>Fase 3: ajuste fino</h3><b>${p3} pontos</b></div><div class=sub>Reserva para jewel sockets, masteries, atributos, pathing e correção de perdas.</div></div><textarea class=ask placeholder="Peça aqui o que quer adicionar: mais dano, mais block, mais ES, chaos res, menos perda de EHP..."></textarea></div><div><h3>Melhor candidato atual</h3><div class=note><b>${short(best.file)}</b><br>${best.ascendancy||best.class} | ${fmt(best.points_used)} pontos usados | score ${fmt(score(best,w))}</div><div class=section><h3>Ganho/perda vs selecionada</h3>${gains.map(g=>{let d=pct(g[1],g[2]);return `<div class=gain><span>${g[0]}</span><b>${fmt(g[1])}</b><span>${d>=0?"+":""}${d.toFixed(1)}%</span><span class="${d>=0?"good":"bad"}">${d>=0?"ganho":"perda"}</span></div>`}).join("")}</div><div class=section><h3>Impacto das alterações</h3>${impactCards(b,best)}</div></div></div><div class=section><h3>Ranking por configuração</h3>${chart(ranked.slice(0,12),"combined_dps")}</div></div>`}
function renderDetail(){let x=selected;if(!x){el("detail").innerHTML='<div class=empty>No selection</div>';return}if(view=="generator"){el("detail").innerHTML=generator();return}let b=selectedBuild||x.build_rows[0];el("detail").innerHTML=`<div class=detail-head><b>${x.skill}</b><span class="warn">${fmt(x.candidate_space)} candidates</span></div><div class=detail-body><div class=tabs>${metricTabs()}</div>${chart(x.build_rows,metric)}<div class=section><h3>Build selecionada</h3><div class=metric><span>Arquivo</span><a href="../${b.file}">${short(b.file)}</a></div><div class=metric><span>DPS</span><b>${fmt(b.combined_dps)}</b></div><div class=metric><span>EHP</span><b>${fmt(b.ehp)}</b></div><div class=metric><span>Life / ES</span><b>${fmt(b.life)} / ${fmt(b.energy_shield)}</b></div><div class=metric><span>Classe</span><b>${b.ascendancy||b.class}</b></div></div><div class=section><h3>Gems</h3>${chips(b.gems,14)}</div><div class=section><h3>Itens</h3>${chips(b.items,14)}</div><div class=section><h3>Nodos</h3>${chips(b.nodes.map(n=>[n,1]),24)}</div></div>`}
function top(id,src){let max=Math.max(...src.map(x=>x[1]),1);el(id).innerHTML=src.slice(0,10).map(x=>`<div class=metric><span>${x[0]}</span><b>${fmt(x[1])}</b></div><div class=bar><i style="width:${x[1]/max*100}%"></i></div>`).join("")}
function render(){if(!data)return;stats();table();renderDetail();top("topGems",data.top_gems);top("topItems",data.top_items);top("topNodes",data.top_nodes)}
</script>
<script>
let data=null,sprites={},view="generator",selected=null,selectedBuild=null,slotChoices={};
const el=id=>document.getElementById(id),fmt=n=>(Math.round(Number(n)||0)).toLocaleString("pt-PT"),short=s=>(s||"").split(/[\\/]/).pop().replace(".xml","");
const slots=[["body","Armadura"],["gloves","Gloves"],["boots","Boots"],["belt","Belt"],["ring1","Ring 1"],["ring2","Ring 2"],["amulet","Amulet"],["helmet","Helmet"],["weapon","Arma"],["offhand","Escudo/Offhand"]];
Promise.all([fetch("build_dashboard_data.json").then(r=>r.json()),fetch("item_sprite_index.json").then(r=>r.ok?r.json():{}).catch(()=>({}))]).then(([j,s])=>{data=j;sprites=s;selected=data.skills[0];selectedBuild=selected.build_rows[0];render()}).catch(e=>{el("detail").innerHTML=`<div class=empty>${e.message}. Abra por http://localhost:8765/</div>`});
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{document.querySelector(".nav .active").classList.remove("active");b.classList.add("active");view=b.dataset.view;render()});
el("q").oninput=render;el("sort").onchange=render;
function pct(n,b){return b?((n-b)/b*100):0}
function chips(xs,n=8){return (xs||[]).slice(0,n).map(x=>`<span class=pill>${x[0]} <small>${x[1]}</small></span>`).join("")}
function rows(){let q=el("q").value.toLowerCase();let r=[...data.skills].filter(x=>(x.skill+" "+JSON.stringify(x.classes)+" "+JSON.stringify(x.items)).toLowerCase().includes(q));let s=el("sort").value;r.sort((a,b)=>s=="dps"?b.best_dps-a.best_dps:s=="space"?b.candidate_space-a.candidate_space:s=="name"?a.skill.localeCompare(b.skill):b.builds-a.builds);return r}
function stats(){let s=data.summary,total=data.skills.reduce((a,x)=>a+x.candidate_space,0);el("stats").innerHTML=[["XML builds",s.xml_builds],["Skills",s.skills_with_xml],["Gems",s.unique_gems],["Items",s.unique_items],["Nodes",s.unique_nodes],["Candidates",total]].map(x=>`<div class=stat><span>${x[0]}</span><b>${fmt(x[1])}</b></div>`).join("")}
function table(){let r=rows();el("title").textContent=view=="generator"?"Skills para gerar":view;el("count").textContent=`${r.length} records`;if(view!="generator"&&view!="skills"){let src=view=="gems"?data.top_gems:view=="items"?data.top_items:data.top_nodes,q=el("q").value.toLowerCase();el("table").innerHTML=`<div class=table-scroll><table><tr><th>Name</th><th class=num>Uses</th></tr>${src.filter(x=>x[0].toLowerCase().includes(q)).map(x=>`<tr><td><span class=skill-name>${x[0]}</span></td><td class=num>${fmt(x[1])}</td></tr>`).join("")}</table></div>`;return}el("table").innerHTML=`<div class=table-scroll>${r.map(x=>`<div class="build-card ${selected&&selected.skill==x.skill?'active':''}" onclick="pick(${data.skills.indexOf(x)})"><div class=skill-name>${x.skill}</div><div class=sub>${fmt(x.builds)} XMLs | best DPS ${fmt(x.best_dps)}</div><div>${chips(x.classes,2)}</div></div>`).join("")}</div>`}
function pick(i){selected=data.skills[i];selectedBuild=selected.build_rows[0];slotChoices={};render()}
function pickBuild(i){selectedBuild=selected.build_rows[i];slotChoices={};renderDetail()}
function score(b,w){return (b.ehp||0)*w.ehp+(b.life||0)*w.life+(b.energy_shield||0)*w.es+(b.block||0)*700*w.block+(b.combined_dps||0)*w.dps+(b.attack_speed||0)*1200*w.speed+(b.crit_multi||0)*35*w.crit}
function val(id,d){let n=document.getElementById(id);return n?Number(n.value||d):d}
function slotKey(it){return it.slot=="ring"?"ring":it.slot=="twohand"?"weapon":it.slot}
function itemPool(slot){let pool=[];for(let b of selected.build_rows||[])for(let it of b.item_details||[]){let k=slotKey(it);if((slot=="ring1"||slot=="ring2")&&k=="ring"||k==slot)pool.push(it)}let seen=new Set();return pool.filter(it=>{let key=it.name+"|"+it.base;if(seen.has(key))return false;seen.add(key);return true}).sort((a,b)=>a.name.localeCompare(b.name))}
function autoSlotMap(items){let m={},rings=[];for(let it of items||[]){if(it.slot=="ring")rings.push(it);else if(it.slot=="twohand"){m.weapon=it;m.offhand={name:"Ocupado por arma two-handed",base:"Slot bloqueado",locked:true}}else if(!m[it.slot])m[it.slot]=it}if(rings[0])m.ring1=rings[0];if(rings[1])m.ring2=rings[1];return m}
function slotMap(items){let m=autoSlotMap(items);for(let k of Object.keys(slotChoices)){let pool=itemPool(k),it=pool.find(x=>x.name+"|"+x.base==slotChoices[k]);if(it)m[k]=it}if(m.weapon&&m.weapon.slot=="twohand")m.offhand={name:"Ocupado por arma two-handed",base:"Slot bloqueado",locked:true};return m}
function imgFor(it){let src=sprites[it.name]||sprites[it.base];return src?`<img class=item-img src="${src}" alt="">`:""}
function optionList(k,it){let pool=itemPool(k);return `<select class=select onchange="slotChoices['${k}']=this.value;renderDetail()"><option value="">Auto</option>${pool.map(x=>{let v=x.name+"|"+x.base;return `<option value="${v.replaceAll('"',"&quot;")}" ${it&&v==it.name+"|"+it.base?"selected":""}>${x.name}</option>`}).join("")}</select>`}
function slotCard(k,l,m){let it=m[k];if(!it)return `<div class=slot><b>${l}</b>${optionList(k,null)}<div class=sub>vazio</div></div>`;return `<div class="slot ${it.locked?'locked':''}"><b>${l}</b>${it.locked?'':optionList(k,it)}${it.locked?'':imgFor(it)}<div class=item-name>${it.name}</div><div class=item-base>${it.base||""}</div><div class=sub>${it.rarity||""}${it.item_level?` | ilvl ${it.item_level}`:""}</div>${(it.implicits||[]).map(x=>`<div class=rule>${x}</div>`).join("")}</div>`}
function itemSlots(b){let m=slotMap(b.item_details||[]);return `<div class=note>Auto aloca por slot. Troque no seletor para ver sprite e dados base em tempo real.</div><div class=slot-grid>${slots.map(s=>slotCard(s[0],s[1],m)).join("")}</div>`}
function jewelRules(b){let js=(b.item_details||[]).filter(i=>i.slot=="jewel");return `<div class=jewels>${js.slice(0,12).map(j=>`<div class=jewel>${imgFor(j)}<div class=item-name>${j.name}</div><div class=item-base>${j.base}</div><div class=rule>Validar limite pela descricao/mod do item antes de duplicar.</div></div>`).join("")||"<div class=sub>Nenhuma joia detectada.</div>"}</div>`}
function gains(base,best){return [["DPS",best.combined_dps,base.combined_dps],["EHP",best.ehp,base.ehp],["Life",best.life,base.life],["ES",best.energy_shield,base.energy_shield],["Block",best.block,base.block]].map(g=>{let d=pct(g[1],g[2]);return `<div class=gain><span>${g[0]}</span><b>${fmt(g[1])}</b><span class="${d>=0?'good':'bad'}">${d>=0?'+':''}${d.toFixed(1)}%</span><span>${d>=0?'ganho':'perda'}</span></div>`}).join("")}
function chart(rs,key){let vals=rs.map(x=>x[key]||0),max=Math.max(...vals,1),base=vals[0]||1;return `<div class=chart>${rs.slice(0,12).map((x,i)=>{let v=x[key]||0,d=pct(v,base);return `<div class=chart-row onclick="pickBuild(${selected.build_rows.indexOf(x)})"><div class=chart-label>${short(x.file)}</div><div class=bar><i style="width:${v/max*100}%"></i></div><div class=num>${fmt(v)}<div class="delta ${d>=0?'good':'bad'}">${i?`${d>=0?'+':''}${d.toFixed(1)}%`:''}</div></div></div>`}).join("")}</div>`}
function generator(){let x=selected,b=selectedBuild||x.build_rows[0],p1=val("p1",45),p2=val("p2",55),p3=Math.max(0,120-p1-p2),w={ehp:val("wEhp",3),life:val("wLife",2),es:val("wEs",1),block:val("wBlock",2),dps:val("wDps",3),speed:val("wSpeed",1),crit:val("wCrit",1)},ranked=[...x.build_rows].sort((a,b)=>score(b,w)-score(a,w)),best=ranked[0]||b;return `<div class=detail-head><b>${x.skill}</b><span class=warn>${p1+p2+p3}/120 pontos</span></div><div class=detail-body><div class=gen><div><div class=phase><div class=phase-head><h3>Fase 1: defesa</h3><input id=p1 type=number min=0 max=120 value="${p1}" oninput="renderDetail()"></div><div class=weights><label>EHP<input id=wEhp type=number value="${w.ehp}" oninput="renderDetail()"></label><label>Life<input id=wLife type=number value="${w.life}" oninput="renderDetail()"></label><label>ES<input id=wEs type=number value="${w.es}" oninput="renderDetail()"></label><label>Block<input id=wBlock type=number value="${w.block}" oninput="renderDetail()"></label></div></div><div class=phase><div class=phase-head><h3>Fase 2: DPS</h3><input id=p2 type=number min=0 max=120 value="${p2}" oninput="renderDetail()"></div><div class=weights><label>DPS<input id=wDps type=number value="${w.dps}" oninput="renderDetail()"></label><label>Speed<input id=wSpeed type=number value="${w.speed}" oninput="renderDetail()"></label><label>Crit<input id=wCrit type=number value="${w.crit}" oninput="renderDetail()"></label></div></div><div class=phase><div class=phase-head><h3>Fase 3: ajuste fino</h3><b>${p3} pontos</b></div><div class=sub>Joias, uniques, masteries, atributos e perdas defensivas.</div></div></div><div><h3>Melhor candidato atual</h3><div class=note><b>${short(best.file)}</b><br>${best.ascendancy||best.class} | ${fmt(best.points_used)} pontos usados</div><div class=section><h3>Ganho/perda vs selecionada</h3>${gains(b,best)}</div></div></div><div class=section><h3>Slots visuais da build selecionada</h3>${itemSlots(b)}</div><div class=section><h3>Joias e limites</h3>${jewelRules(b)}</div><div class=section><h3>Ranking por configuracao</h3>${chart(ranked,"combined_dps")}</div></div>`}
function renderDetail(){if(!selected){el("detail").innerHTML="<div class=empty>No selection</div>";return}if(view=="generator"){el("detail").innerHTML=generator();return}let b=selectedBuild||selected.build_rows[0];el("detail").innerHTML=`<div class=detail-head><b>${selected.skill}</b><span class=warn>${fmt(selected.candidate_space)} candidates</span></div><div class=detail-body>${chart(selected.build_rows,"combined_dps")}<div class=section><h3>Itens</h3>${itemSlots(b)}</div></div>`}
function top(id,src){let max=Math.max(...src.map(x=>x[1]),1);el(id).innerHTML=src.slice(0,10).map(x=>`<div class=metric><span>${x[0]}</span><b>${fmt(x[1])}</b></div><div class=bar><i style="width:${x[1]/max*100}%"></i></div>`).join("")}
function render(){if(!data)return;stats();table();renderDetail();top("topGems",data.top_gems);top("topItems",data.top_items);top("topNodes",data.top_nodes)}
</script>
</body>
</html>
