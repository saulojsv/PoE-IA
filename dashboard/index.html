ius:3px;background:#243024;border-color:#46563f}.gear:hover,.jewel-slot:hover,.pool-item:hover{border-color:#d0a856;box-shadow:0 0 0 1px rgba(208,168,86,.35),0 8px 24px rgba(0,0,0,.2)}.gear.active,.jewel-slot.active,.pool-item.active{border-color:#d0a856;box-shadow:0 0 0 1px #d0a856;background:#202820}.pool{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}.pool-item{border-radius:6px;min-height:88px;background:#10151b}.pool-item .item-name{font-weight:850;color:#f5f7f8}.item-name{font-weight:850;color:#f5f7f8}.item-base,.muted{color:#a8b8c6}.metric{padding:9px 0}.metric span{color:#d9e1e8}.metric b{font-variant-numeric:tabular-nums;color:#fff}.bar{background:#26313b}.bar i{background:linear-gradient(90deg,#caa45d,#76b4dc)}.jewel-section{padding-top:4px}.jewel-title{font-weight:850;color:#91a4b3}.jewel-slot{border-radius:5px;background:#10151b}.missing-sprite{border-color:#5d3434;color:#df8585;background:#1a1113}.item-mods{background:#10151b;border:1px solid #2a333d;border-radius:5px;padding:10px;margin-top:12px}.implicit{color:#d8c08a}.explicit{color:#9fc7f0}.chart-row{cursor:pointer;padding:6px;border-radius:5px}.chart-row:hover{background:#1b232c}.phase-grid{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:14px;margin-bottom:16px}.phase-card{background:#10151b;border:1px solid #2b3540;border-radius:6px;padding:14px}.phase-card h3{margin:0 0 8px;font-size:14px;color:#f5f7f8}.weight-row{display:grid;grid-template-columns:92px 1fr 44px;gap:10px;align-items:center;margin:8px 0}.weight-row input{width:100%;accent-color:#caa45d}.slot-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.slot-chip{border:1px solid #33404b;background:#10151b;color:#cbd6df;border-radius:6px;padding:7px 10px;font-weight:800;cursor:pointer}.slot-chip.active{border-color:#caa45d;background:#242820;color:#fff}.compare-card{display:grid;grid-template-columns:58px 1fr auto;gap:10px;align-items:center;background:#10151b;border:1px solid #2a333d;border-radius:6px;padding:10px;margin-bottom:8px}.compare-card .sprite{float:none;margin:0;width:54px;height:54px}.score{font-weight:900;color:#caa45d}.rule-badge{display:inline-flex;border:1px solid #3c4a55;background:#111820;border-radius:6px;padding:5px 8px;font-size:12px;font-weight:850;color:#bdd0de}.poe-source{color:#caa45d;font-weight:900}.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini-stat{background:#10151b;border:1px solid #2a333d;border-radius:6px;padding:10px}.mini-stat span{display:block;color:#91a4b3;font-size:11px;text-transform:uppercase;font-weight:850}.mini-stat b{font-size:18px}@media(max-width:1450px){.items-layout{grid-template-columns:1fr 1fr}.items-layout>div:last-child{grid-column:1/-1}}@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.stats,.layout,.items-layout,.panels,.phase-grid{grid-template-columns:1fr}.main{padding:18px}.hero{align-items:flex-start;flex-direction:column}.search{width:100%;min-width:0}}

<body>
<div class="app">
<aside class="side">
<div class="brand">PoE Build Lab</div>
<div class="sub">Builds, itens e geração visual</div>
<nav class="nav">
<button class="active" data-view="generator">Smart Generator</button>
<button data-view="skills">Skills</button>
<button data-view="gems">Gems</button>
<button data-view="items">Items</button>
<button data-view="nodes">Nodes</button>
</nav>
</aside>
<main class="main">
<div class="hero">
<div><h1>Inteligência de Builds</h1><p>Análise local de XMLs, equipamento, sprites e combinações por build.</p></div>
<div class="toolbar"><input class="search" id="q" placeholder="Buscar skill, classe, item, gem ou nodo"><select class="select" id="sort"><option value="builds">Mais builds</option><option value="dps">Maior DPS</option><option value="space">Mais combinações</option><option value="name">Nome</option></select></div>
</div>
<section class="stats" id="stats"></section>
<section class="layout">
<div class="list"><div class="head"><b id="title">Skills</b><span class="sub" id="count"></span></div><div id="table" class="scroll"></div></div>
<aside class="detail" id="detail"><div class="empty">Carregando dados...</div></aside>
</section>
<section class="panels"><div class="panel"><h2>Top Gems</h2><div id="topGems"></div></div><div class="panel"><h2>Top Items</h2><div id="topItems"></div></div><div class="panel"><h2>Top Nodes</h2><div id="topNodes"></div></div></section>
</main>
</div>
<script>
let data=null,sprites={},modSources=[],baseMods={bases:{},mods:{}},anointments=[],view="generator",genTab="items",selected=null,selectedBuild=null,activeSlot="body",activeJewel="",slotChoices={},weights={ehp:3,life:2,es:1,block:2,suppression:2,dps:3,attack_speed:1,crit_multi:1};
const slots=[["helmet","Helmet"],["amulet","Amulet"],["body","Armadura"],["weapon","Arma"],["offhand","Offhand"],["gloves","Gloves"],["ring1","Ring 1"],["ring2","Ring 2"],["belt","Belt"],["boots","Boots"]];
const el=id=>document.getElementById(id),fmt=n=>(Math.round(Number(n)||0)).toLocaleString("pt-PT"),short=s=>(s||"").split(/[\\/]/).pop().replace(".xml","").replace(/_/g," ");
Promise.all([fetch("build_dashboard_data.json?v=poe1-master").then(r=>r.json()),fetch("item_sprite_index.json?v=poe1-master").then(r=>r.ok?r.json():{}).catch(()=>({})),fetch("../data/items/modifier_sources.json?v=poe1-master").then(r=>r.ok?r.json():[]).catch(()=>[]),fetch("item_base_mod_summary.json?v=poe1-master").then(r=>r.ok?r.json():{bases:{}}).catch(()=>({bases:{}})),fetch("../data/items/amulet_anointments.json?v=poe1-master").then(r=>r.ok?r.json():{anointments:[]}).catch(()=>({anointments:[]}))]).then(([j,s,m,bm,a])=>{data=j;sprites=s;modSources=m;baseMods=bm;anointments=a.anointments||[];selected=data.skills.find(validSkill)||data.skills[0];selectedBuild=selected.build_rows[0];activeSlot=firstSlot(selectedBuild);render()}).catch(e=>{el("detail").innerHTML=`<div class=empty>${e.message}. Abra por http://localhost:8765/dashboard/</div>`});
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{document.querySelector(".nav .active").classList.remove("active");b.classList.add("active");view=b.dataset.view;render()});
el("q").oninput=render;el("sort").onchange=render;
function pct(n,b){return b?((n-b)/b*100):0}
function chips(xs,n=8){return (xs||[]).slice(0,n).map(x=>`<span class=pill>${x[0]} <small>${x[1]}</small></span>`).join("")}
function safeFile(s){return (s||"").normalize("NFKD").replace(/[^\w.-]+/g,"_").replace(/^_+|_+$/g,"")}
function spriteSrc(it,slot=""){if(!it)return "";let rare=["Rare","Magic","Normal"].includes(it.rarity),src="";if(rare){src=sprites[it.base]||""}else{src=sprites[it.name]||sprites[it.base]||""}return src||""}
function img(it,slot=""){let src=spriteSrc(it,slot);return src?`<img class=sprite src="${src}" alt="">`:`<div class=missing-sprite>missing<br>sprite</div>`}
function validSkill(x){return x&&x.skill&&!["xml","extraction samples","root"].includes(String(x.skill).toLowerCase())}
function rows(){let q=el("q").value.toLowerCase();let r=[...data.skills].filter(validSkill).filter(x=>(x.skill+" "+JSON.stringify(x.classes)+" "+JSON.stringify(x.items)).toLowerCase().includes(q));let s=el("sort").value;r.sort((a,b)=>s=="dps"?b.best_dps-a.best_dps:s=="space"?b.candidate_space-a.candidate_space:s=="name"?a.skill.localeCompare(b.skill):b.builds-a.builds);return r}
function renderStats(){let s=data.summary,skills=data.skills.filter(validSkill),total=skills.reduce((a,x)=>a+x.candidate_space,0);el("stats").innerHTML=[["PoE",1],["XMLs",s.xml_builds],["Skills",skills.length],["Itens",s.unique_items],["Nodos",s.unique_nodes],["Combinações",total]].map(x=>`<div class=stat><span>${x[0]}</span><b>${fmt(x[1])}</b></div>`).join("")}
function renderTable(){let r=rows();el("title").textContent=view=="generator"?"Skills para gerar":view;el("count").textContent=`${r.length} registros`;if(view!="generator"&&view!="skills"){let src=view=="gems"?data.top_gems:view=="items"?data.top_items:data.top_nodes,q=el("q").value.toLowerCase();el("table").innerHTML=`<table><tr><th>Nome</th><th class=num>Usos</th></tr>${src.filter(x=>x[0].toLowerCase().includes(q)).map(x=>`<tr><td>${x[0]}</td><td class=num>${fmt(x[1])}</td></tr>`).join("")}</table>`;return}el("table").innerHTML=r.map(x=>`<div class="skill ${selected&&selected.skill==x.skill?'active':''}" onclick="pick(${data.skills.indexOf(x)})"><div class=skill-name>${x.skill}</div><div class=muted>${fmt(x.builds)} XMLs | maior DPS ${fmt(x.best_dps)}</div><div>${chips(x.classes,2)}</div></div>`).join("")}
function firstSlot(b){let m=autoMap(b.item_details||[]);return slots.find(s=>m[s[0]]&&!m[s[0]].locked)?.[0]||"body"}
function pick(i){selected=data.skills[i];selectedBuild=selected.build_rows[0];activeSlot=firstSlot(selectedBuild);activeJewel="";slotChoices={};render()}
function pickBuild(i){selectedBuild=selected.build_rows[i];activeSlot=firstSlot(selectedBuild);activeJewel="";slotChoices={};renderDetail()}
function keyFor(it){let t=((it.base||"")+" "+(it.name||"")).toLowerCase(),bi=baseInfo(it);if(t.includes("flask")||(bi&&bi.slot=="flask"))return "flask";let s=(bi&&bi.slot)||it.slot;return s=="jewel"?"jewel":s=="ring"?"ring":s=="twohand"?"weapon":s}
function autoMap(items){let m={},rings=[];for(let it of items||[]){if(it.slot=="ring")rings.push(it);else if(it.slot=="twohand"){m.weapon=it;m.offhand={name:"Ocupado por arma two-handed",base:"Slot bloqueado",locked:true}}else if(!m[it.slot])m[it.slot]=it}if(rings[0])m.ring1=rings[0];if(rings[1])m.ring2=rings[1];return m}
function pool(slot){let out=[];for(let b of selected.build_rows||[])for(let it of b.item_details||[]){let k=keyFor(it);if(k!="flask"&&(slot=="jewel"&&k=="jewel"||((slot=="ring1"||slot=="ring2")&&k=="ring")||k==slot))out.push(it)}let seen=new Set();return out.filter(it=>{let k=it.name+"|"+it.base;if(seen.has(k))return false;seen.add(k);return true}).sort((a,b)=>a.name.localeCompare(b.name))}
function currentMap(){let m=autoMap(selectedBuild.item_details||[]);for(let k in slotChoices){let it=pool(k).find(x=>x.name+"|"+x.base==slotChoices[k]);if(it)m[k]=it}if(m.weapon&&m.weapon.slot=="twohand")m.offhand={name:"Ocupado por arma two-handed",base:"Slot bloqueado",locked:true};return m}
function itemKey(it){return [it.name||"",it.base||"",it.item_level||"",it.rarity||"",it.unique_id||""].join("|")}
function choose(slot,it){slotChoices[slot]=it.name+"|"+it.base;activeSlot=slot;activeJewel="";renderDetail()}
function chooseJewel(key){activeSlot="jewel";activeJewel=key;renderDetail()}
function setSlot(k){activeSlot=k;if(k!="jewel")activeJewel="";renderDetail()}
function slotCard(k,l,m){let it=m[k];if(!it)return `<div class="slot ${activeSlot==k?'active':''}" onclick="setSlot('${k}')"><div class=slot-label>${l}</div><div class=muted>vazio</div></div>`;return `<div class="slot ${activeSlot==k?'active':''} ${it.locked?'locked':''}" ${it.locked?'':`onclick="setSlot('${k}')"`}><div class=slot-label>${l}</div>${it.locked?'':img(it)}<div class=item-name>${it.name}</div><div class=item-base>${it.base||""}</div><div class=muted>${it.rarity||""}${it.item_level?` | ilvl ${it.item_level}`:""}</div></div>`}
function tip(it){if(!it)return "Slot vazio";let im=(it.implicits||[]).join("\n"),ex=(it.explicits||[]).join("\n");return [it.name,it.base||"",`${it.rarity||"-"} | ilvl ${it.item_level||"-"}`,im,ex&&"----------",ex].filter(Boolean).join("\n").replace(/"/g,"&quot;")}
function emptyBox(text){return `<div class=empty-slot>${text}</div>`}
function gearCard(k,m){let cls=k=="body"?"bodySlot":k,it=m[k],label=(slots.find(x=>x[0]==k)||[k,k])[1];if(!it)return `<div class="gear ${cls} ${activeSlot==k?'active':''}" data-tip="${label}: vazio" onclick="setSlot('${k}')">${emptyBox('empty<br>slot')}<small>${label}</small></div>`;return `<div class="gear ${cls} ${activeSlot==k?'active':''} ${it.locked?'locked':''}" data-tip="${tip(it)}" ${it.locked?'':`onclick="setSlot('${k}')"`}>${it.locked?emptyBox('locked'):img(it,k)}<small>${it.locked?'bloqueado':it.name}</small></div>`}
function flaskBar(items){let fs=(items||[]).filter(x=>(x.base||x.name||"").toLowerCase().includes("flask")).slice(0,5);return `<div class=flasks>${[0,1,2,3,4].map(i=>{let it=fs[i];return `<div class="gear flask" data-tip="${it?tip(it):'Flask vazio'}">${it?img(it,"flask"):emptyBox('empty')}<small>${it?it.name:'Flask'}</small></div>`}).join("")}</div>`}
function jewelSections(b){let jewels=(b.item_details||[]).filter(x=>x.slot=="jewel"),groups={cluster:[],base:[],other:[],abyss:[]};for(let it of jewels){let t=(it.base+" "+it.name).toLowerCase();if(t.includes("cluster"))groups.cluster.push(it);else if(t.includes("abyss")||t.includes("ghastly")||t.includes("hypnotic")||t.includes("murderous")||t.includes("searching"))groups.abyss.push(it);else if(t.includes("crimson")||t.includes("cobalt")||t.includes("viridian")||t.includes("prismatic"))groups.base.push(it);else groups.other.push(it)}let row=(title,arr)=>`<div class=jewel-title>${title}</div><div class=jewel-row>${arr.slice(0,10).map((it,i)=>{let k=itemKey(it);return `<div class="jewel-slot ${activeSlot=='jewel'&&activeJewel==k?'active':''}" onclick='chooseJewel(${JSON.stringify(k)})' data-tip="${tip(it)}">${img(it,"jewel")}</div>`}).join("")||`<div class=muted>vazio</div>`}</div>`;return `<div class=jewel-section>${row("Cluster Jewels",groups.cluster)}${row("Base Jewels",groups.base)}${row("Other",groups.other)}${row("Abyss Jewels",groups.abyss)}</div>`}
function equipmentBoard(m,b){return `<div class=panel><h2>Equipamento visual</h2><div class=equip-board>${["weapon","helmet","amulet","body","offhand","gloves","ring1","ring2","belt","boots"].map(k=>gearCard(k,m)).join("")}${flaskBar(b.item_details)}</div>${jewelSections(b)}</div>`}
function baseInfo(it){return it?baseMods.bases[it.base]||baseMods.bases[it.name]||null:null}
function eligibleMods(it){let b=baseInfo(it);if(!b)return [];let il=it.item_level||100;return (b.sample_mods||[]).filter(m=>m.min_item_level<=il)}
function modPanel(it){let b=baseInfo(it),mods=eligibleMods(it),prefix=b?(b.prefix_count||0):0,suffix=b?(b.suffix_count||0):0,imp=b?(b.other_count||0):0;if(!it)return "";return `<div class=panel><h2>Modificadores por base</h2><div class=muted>${b?`${it.base} | ilvl ${it.item_level||"-"} | ${b.mod_count||mods.length} mods elegiveis pelo PoB`:`Base ainda sem catalogo PoB: ${it.base||it.name}`}</div>${b?`<div class=metric><span>Prefixos</span><b>${fmt(prefix)}</b></div><div class=metric><span>Sufixos</span><b>${fmt(suffix)}</b></div><div class=metric><span>Implicitos/Especiais</span><b>${fmt(imp)}</b></div>${mods.slice(0,10).map(m=>`<div class=metric><span>${m.group||m.id}<div class=muted>${m.type||m.source} | ilvl ${m.min_item_level}</div></span><b>${m.line||""}</b></div>`).join("")}`:"<div class=muted>Nenhuma base encontrada no catalogo.</div>"}</div>`}
const metricRows=[["DPS","combined_dps"],["EHP","ehp"],["Vida","life"],["ES","energy_shield"],["Ward","ward"],["Block","block"],["Spell block","spell_block"],["Suppress","suppression"],["Fire res","fire_resist"],["Cold res","cold_resist"],["Lightning res","lightning_resist"],["Chaos res","chaos_resist"],["Atk speed","attack_speed"],["Crit multi","crit_multi"]];
function buildWithItem(it,baseBuild){if(!it)return null;let key=it.name+"|"+it.base;return selected.build_rows.find(b=>b!==baseBuild&&(b.item_details||[]).some(x=>x.name+"|"+x.base==key))||null}
function metricPanel(base,it){let target=buildWithItem(it,base),note=target?"Comparação baseada em outro XML que usa este item.":"Sem XML comparável para este item.";return `<div class=panel><h2>Atributos da build</h2><div class=muted>${note}</div>${metricRows.map(([label,key])=>{let a=base[key]||0,b=target?target[key]||0:a,d=target?pct(b,a):0,abs=b-a,cls=d>=0?"good":"bad",arrow=d>=0?"▲":"▼",tone=key=="life"?" metric-life":key=="energy_shield"?" metric-es":key=="ward"?" metric-ward":"";return `<div class="metric${tone}"><span>${label} ${target?`<span class="deltaIcon ${cls}">${arrow}</span>`:""}</span><b><span class=oldVal>${fmt(a)}</span>${target?` → <span class=newVal>${fmt(b)}</span> <span class="${cls}">${abs>=0?"+":""}${fmt(abs)} (${d>=0?"+":""}${d.toFixed(1)}%)</span>`:""}</b></div>`}).join("")}</div>`}function anointPanel(it){if(!it||it.slot!="amulet")return "";return `<div class=panel><h2>Anointments possíveis</h2><div class=muted>${anointments.length} combinações de óleo para amuleto/blight unique</div>${anointments.slice(0,14).map(a=>`<div class=metric><span>${a.name}<div class=muted>${a.recipe}</div></span><b>${(a.modifier_lines||[]).slice(0,1).join(" ")}</b></div>`).join("")}</div>`}
function itemMods(it){let im=it.implicits||[],ex=it.explicits||[];if(!im.length&&!ex.length)return "";return `<div class=item-mods>${im.map(x=>`<div class=implicit>${x}</div>`).join("")}${ex.length?`<div class=mod-divider></div>${ex.map(x=>`<div class=explicit>${x}</div>`).join("")}`:""}</div>`}
function itemPanel(it){let base=selectedBuild||selected.build_rows[0];if(!it)return `<div class=panel><h2>Item</h2><div class=muted>Selecione um slot.</div></div>`;return `<div>${`<div class=panel><h2>Item selecionado</h2>${img(it)}<div class=item-name>${it.name}</div><div class=item-base>${it.base||""}</div><div class=metric><span>Rarity</span><b>${it.rarity||"-"}</b></div><div class=metric><span>Item level</span><b>${it.item_level||"-"}</b></div><div class=metric><span>Slot</span><b>${it.slot||"-"}</b></div>${itemMods(it)}</div>`}${metricPanel(base,it)}${anointPanel(it)}${modPanel(it)}</div>`}
function scoreBuild(b){return (b.ehp||0)*weights.ehp+(b.life||0)*weights.life+(b.energy_shield||0)*weights.es+(b.block||0)*weights.block*1000+(b.suppression||0)*weights.suppression*800+(b.combined_dps||0)*weights.dps+(b.attack_speed||0)*weights.attack_speed*10000+(b.crit_multi||0)*weights.crit_multi*1000}
function setWeight(k,v){weights[k]=Number(v)||0;renderDetail()}
function weightRow(k,label){return `<div class=weight-row><span>${label}</span><input type=range min=0 max=5 step=1 value="${weights[k]}" oninput="setWeight('${k}',this.value)"><b>${weights[k]}</b></div>`}
function phasePanel(){return `<div class=phase-grid><div class=phase-card><h3>Fase 1 · Defesa</h3>${weightRow("ehp","EHP")}${weightRow("life","Vida")}${weightRow("es","ES")}${weightRow("block","Block")}${weightRow("suppression","Suppress")}</div><div class=phase-card><h3>Fase 2 · DPS</h3>${weightRow("dps","DPS")}${weightRow("attack_speed","Atk speed")}${weightRow("crit_multi","Crit multi")}<div class=muted>Ranking local baseado nos XMLs PoE 1.</div></div></div>`}
function slotStrip(){return `<div class=slot-strip>${slots.map(([k,l])=>`<button class="slot-chip ${activeSlot==k?'active':''}" onclick="setSlot('${k}')">${l}</button>`).join("")}<button class="slot-chip ${activeSlot=='jewel'?'active':''}" onclick="setSlot('jewel')">Jewels</button></div>`}
function tabButton(k,l){return `<button class="btn ${genTab==k?'active':''}" onclick="genTab='${k}';renderDetail()">${l}</button>`}
function poolPanel(m){let list=pool(activeSlot),cur=m[activeSlot];return `<div class=panel><h2>Opções do slot</h2><div class=muted>${list.length} itens PoE 1 encontrados nos XMLs desta skill</div><div class=pool>${list.map(it=>`<div class="pool-item ${cur&&cur.name==it.name&&cur.base==it.base?'active':''}" data-tip="${tip(it)}" onclick='choose("${activeSlot}",${JSON.stringify(it)})'>${img(it,activeSlot)}<div class=item-name>${it.name}</div><div class=item-base>${it.base}</div></div>`).join("")||"<div class=empty>Nenhum item para este slot.</div>"}</div></div>`}
function itemScore(it,base){let target=buildWithItem(it,base);return target?scoreBuild(target)-scoreBuild(base):0}
function smartItemCards(base){let list=pool(activeSlot).slice(0,18).map(it=>({it,score:itemScore(it,base)})).sort((a,b)=>b.score-a.score);return `<div class=panel><h2>Combinações do slot</h2><div class=muted>Ordenado por score ponderado de Defesa + DPS.</div>${list.map(x=>`<div class=compare-card onclick='choose("${activeSlot}",${JSON.stringify(x.it)})'>${img(x.it,activeSlot)}<div><div class=item-name>${x.it.name}</div><div class=item-base>${x.it.base}</div></div><div class="score ${x.score>=0?'good':'bad'}">${x.score>=0?'+':''}${fmt(x.score)}</div></div>`).join("")||"<div class=empty>Nenhum item para este slot.</div>"}</div>`}
function gains(base,best){return [["DPS",best.combined_dps,base.combined_dps],["EHP",best.ehp,base.ehp],["Life",best.life,base.life],["ES",best.energy_shield,base.energy_shield],["Block",best.block,base.block]].map(g=>{let d=pct(g[1],g[2]);return `<div class=metric><span>${g[0]}</span><b class="${d>=0?'good':'bad'}">${d>=0?'+':''}${d.toFixed(1)}%</b></div>`}).join("")}
function chart(rs,key){let vals=rs.map(x=>x[key]||0),max=Math.max(...vals,1),base=vals[0]||1;return rs.slice(0,10).map((x,i)=>{let v=x[key]||0,d=pct(v,base);return `<div class=chart-row onclick="pickBuild(${selected.build_rows.indexOf(x)})"><div class=chart-label title="${short(x.file)}">${short(x.file)}</div><div class=bar><i style="width:${v/max*100}%"></i></div><div class=num><div>${fmt(v)}</div><div class="${d>=0?'good':'bad'}">${i?`${d>=0?'+':''}${d.toFixed(1)}%`:"base"}</div></div></div>`}).join("")}
function phaseMetrics(keys){let ranked=[...selected.build_rows].sort((a,b)=>scoreBuild(b)-scoreBuild(a)),base=selectedBuild||ranked[0],best=ranked[0]||base;return `<div class=grid style="grid-template-columns:1fr 1fr"><div class=panel><h2>Melhor candidato ponderado</h2>${keys.map(([l,k])=>{let a=base[k]||0,b=best[k]||0,d=pct(b,a),cls=d>=0?"good":"bad";return `<div class=metric><span>${l}</span><b><span class=oldVal>${fmt(a)}</span> → <span class=newVal>${fmt(b)}</span> <span class="${cls}">${d>=0?"+":""}${d.toFixed(1)}%</span></b></div>`}).join("")}</div><div class=panel><h2>Ranking por score</h2>${ranked.slice(0,10).map(b=>`<div class=chart-row onclick="pickBuild(${selected.build_rows.indexOf(b)})"><div class=chart-label>${short(b.file)}</div><div class=bar><i style="width:${Math.max(4,scoreBuild(b)/Math.max(scoreBuild(ranked[0]),1)*100)}%"></i></div><div class=num>${fmt(scoreBuild(b))}</div></div>`).join("")}</div></div>`}
function defenseTab(){return `${phasePanel()}${phaseMetrics([["EHP","ehp"],["Vida","life"],["ES","energy_shield"],["Block","block"],["Suppress","suppression"],["Fire res","fire_resist"],["Cold res","cold_resist"],["Lightning res","lightning_resist"],["Chaos res","chaos_resist"]])}`}
function dpsTab(){return `${phasePanel()}${phaseMetrics([["DPS","combined_dps"],["Atk speed","attack_speed"],["Crit multi","crit_multi"]])}`}
function generator(){let b=selectedBuild||selected.build_rows[0],ranked=[...selected.build_rows].sort((a,b)=>scoreBuild(b)-scoreBuild(a)),best=ranked[0]||b,m=currentMap(),jewels=(b.item_details||[]).filter(x=>x.slot=="jewel"),it=activeSlot=="jewel"?(jewels.find(x=>itemKey(x)==activeJewel)||jewels[0]):m[activeSlot];if(activeSlot=="jewel"&&!activeJewel&&it)activeJewel=itemKey(it);let content=genTab=="defense"?defenseTab():genTab=="dps"?dpsTab():`${phasePanel()}${slotStrip()}<div class=items-layout>${equipmentBoard(m,b)}<div>${poolPanel(m)}${smartItemCards(b)}</div>${itemPanel(it)}</div><div class=grid style="grid-template-columns:1fr 1fr;margin-top:16px"><div class=panel><h2>Ganho/perda do melhor candidato</h2>${gains(b,best)}</div><div class=panel><h2>Ranking por DPS</h2>${chart(ranked,"combined_dps")}</div></div>`;return `<div class=head><b>${selected.skill}</b><span><span class=rule-badge>PoE 1 only</span> <span class=muted>${fmt(selected.candidate_space)} combinações</span></span></div><div class=body><div class=tabs>${tabButton("items","Itens")}${tabButton("defense","Defesa")}${tabButton("dps","DPS")}</div>${content}</div>`}
function renderDetail(){if(!selected)return;el("detail").innerHTML=generator()}
function renderTop(id,src){let max=Math.max(...src.map(x=>x[1]),1);el(id).innerHTML=src.slice(0,10).map(x=>`<div class=metric><span>${x[0]}</span><b>${fmt(x[1])}</b></div><div class=bar><i style="width:${x[1]/max*100}%"></i></div>`).join("")}
function render(){if(!data)return;renderStats();renderTable();renderDetail();renderTop("topGems",data.top_gems);renderTop("topItems",data.top_items);renderTop("topNodes",data.top_nodes)}
</script>
</body>
</html>
